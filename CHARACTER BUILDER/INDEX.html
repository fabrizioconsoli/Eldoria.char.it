<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Eldoria - Forgiatore degli Eredi della Luce</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>⚔ Eldoria ⚔</h1>
<h2>Forgiatore degli Eredi della Luce</h2>
<p>"La luce è spezzata. Tocca a te ricomporla."</p>
</header>


<div class="container">

<section class="creator">

<h2>Crea il tuo Eroe</h2>


<label>Nome Personaggio</label>
<input id="nome" placeholder="Nome dell'eroe">


<label>Razza</label>

<select id="razza">

<option>Umano</option>
<option>Elfo</option>
<option>Nano</option>
<option>Mezzelfo</option>
<option>Tiefling</option>
<option>Dragonide</option>

<option>Figlio della Luce</option>
<option>Nato dalle Nebbie</option>
<option>Sangue Divino</option>

</select>


<label>Classe</label>

<select id="classe">

<option>Guerriero</option>
<option>Mago</option>
<option>Chierico</option>
<option>Ladro</option>
<option>Ranger</option>
<option>Paladino</option>
<option>Druido</option>
<option>Warlock</option>
<option>Stregone</option>

</select>



<label>Origine</label>

<select id="background">

<option>Antico Custode</option>
<option>Sopravvissuto della Frattura</option>
<option>Cavaliere Perduto</option>
<option>Studioso di Nythera</option>
<option>Figlio delle Nebbie</option>

</select>


<button onclick="generaStatistiche()">
🎲 Tira le statistiche
</button>


<div id="stats">

</div>


<label>Storia del personaggio</label>

<textarea id="storia"
placeholder="Racconta la tua leggenda...">
</textarea>


<button onclick="creaScheda()">
✨ Forgia il Personaggio
</button>


</section>



<section class="scheda">

<h2>Scheda Eroe</h2>

<div id="output">

Nessun eroe creato...

</div>

</section>


</div>


<script src="script.js"></script>

</body>
</html>
